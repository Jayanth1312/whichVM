<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Black Background Circle -->
  <circle cx="256" cy="256" r="240" fill="#000000" />
  
  <g transform="translate(256, 256) scale(2.1)">
    <!-- Faces (no stroke) -->
    <polygon points="0,-100 87,-50 0,0 -87,-50" fill="#ffffff" stroke="none" />
    <polygon points="0,0 87,-50 87,50 0,100" fill="#ffffff" stroke="none" />
    <polygon points="0,0 -87,-50 -87,50 0,100" fill="#ffffff" stroke="none" />

    <!-- Outer Border with stroke overlay -->
    <polyline points="-87,-50 0,-100 87,-50" fill="none" stroke="#000000" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" />
    <polyline points="87,-50 87,50 0,100" fill="none" stroke="#000000" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" />
    <polyline points="-87,-50 -87,50 0,100" fill="none" stroke="#000000" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" />

    <!-- 3 inner lines from center -->
    <line x1="0" y1="0" x2="0" y2="100" stroke="#000000" stroke-width="5" stroke-linecap="round" />
    <line x1="0" y1="0" x2="-87" y2="-50" stroke="#000000" stroke-width="5" stroke-linecap="round" />
    <line x1="0" y1="0" x2="87" y2="-50" stroke="#000000" stroke-width="5" stroke-linecap="round" />
  </g>
</svg>
